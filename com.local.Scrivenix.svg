  <circle cx="256" cy="256" r="252" fill="url(#ringC)"/>
  <circle cx="256" cy="256" r="221" fill="#605040"/>
  <circle cx="256" cy="256" r="213" fill="url(#bevelC)"/>
  <circle cx="256" cy="256" r="205" fill="#3a2e20"/>
  <circle cx="256" cy="256" r="203" fill="url(#faceC)"/>

  <g clip-path="url(#clipC)">
    <!-- Outer green (letter body) -->
    <path d="M 322,152
             C 322,118  172,118  172,196
             C 172,254  338,264  338,318
             C 338,390  182,390  182,366"
          fill="none"
          stroke="#00c853"
          stroke-width="84"
          stroke-linecap="square"/>

    <!-- Inner black cutout (makes it hollow / outlined) -->
    <path d="M 322,152
             C 322,118  172,118  172,196
             C 172,254  338,264  338,318
             C 338,390  182,390  182,366"
          fill="none"
          stroke="#000000"
          stroke-width="42"
          stroke-linecap="butt"/>
  </g>
</svg>
