<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="ringC" cx="36%" cy="26%" r="70%">
      <stop offset="0%" stop-color="#d4c8a8"/>
      <stop offset="30%" stop-color="#a09070"/>
      <stop offset="65%" stop-color="#706248"/>
      <stop offset="100%" stop-color="#403828"/>
    </radialGradient>
    <radialGradient id="bevelC" cx="40%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#e4d8b8"/>
      <stop offset="50%" stop-color="#b4a078"/>
      <stop offset="100%" stop-color="#807050"/>
    </radialGradient>
    <radialGradient id="faceC" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#030303"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <clipPath id="clipC"><circle cx="256" cy="256" r="201"/></clipPath>
